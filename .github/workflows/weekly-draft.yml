name: Weekly Draft Generation

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      mix_date:
        description: Optional ISO date override
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate weekly draft
        env:
          MMM_OPENAI_API_KEY: ${{ secrets.MMM_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.mix_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.mix_date }}"
          fi
          python3 scripts/generate_weekly_draft.py $DATE_ARG --mode auto --force

      - name: Upload generated draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-draft
          path: data/drafts/*.json
          if-no-files-found: error

      - name: Commit generated draft
        run: |
          set -euo pipefail
          if git diff --quiet -- data/drafts; then
            echo "No draft changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/drafts
          git commit -m "chore: generate weekly MMM draft"
          git push
